<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            text-align: center;
        }
        .error h2 {
            color: #e53e3e;
            margin: 0 0 10px;
        }
        .error p {
            color: #4a5568;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting...</p>
    </div>

    <script>
        async function redirect() {
            const path = window.location.pathname;
            const shortCode = path.split('/').pop();

            if (!shortCode) {
                showError('Invalid link');
                return;
            }

            try {
                const response = await fetch(`https://jrvqhvzqcnntwngttedl.supabase.co/functions/v1/redirect/${shortCode}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpydnFodnpxY25udHduZ3R0ZWRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTU5NjgsImV4cCI6MjA4ODQzMTk2OH0.aC1CwuioKdMtdIw1U3NS69CboRbM4YOryTxUH9CH7pI',
                    },
                    redirect: 'manual'
                });

                if (response.status === 302 || response.type === 'opaqueredirect') {
                    const location = response.headers.get('Location');
                    if (location) {
                        window.location.href = location;
                    } else {
                        window.location.href = `https://jrvqhvzqcnntwngttedl.supabase.co/functions/v1/redirect/${shortCode}`;
                    }
                } else if (response.status === 404) {
                    showError('Link not found');
                } else if (response.status === 410) {
                    showError('This link has been deactivated');
                } else {
                    showError('Failed to redirect');
                }
            } catch (error) {
                console.error('Redirect error:', error);
                showError('An error occurred');
            }
        }

        function showError(message) {
            document.body.innerHTML = `
                <div class="error">
                    <h2>Oops!</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        redirect();
    </script>
</body>
</html>
